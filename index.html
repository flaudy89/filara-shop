<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filara 3D Tisk – Handmade 3D výtisky</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800;900&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --orange: #FA6831;
    --orange-dark: #E55A25;
    --orange-light: #FFF0EB;
    --bg: #F5F5F5;
    --card: #FFFFFF;
    --text: #222222;
    --text-muted: #6B7280;
    --border: #E5E7EB;
    --dark: #1A1A2E;
    --dark-card: #232340;
    --green: #10B981;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--dark);
    padding: 0 24px;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,.25);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-text {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 26px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  .logo-sub {
    color: rgba(255,255,255,.45);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: .5px;
    text-transform: uppercase;
  }

  .header-sep { color: rgba(255,255,255,.2); margin: 0 10px; }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .cart-btn {
    background: rgba(255,255,255,.1);
    border: 1px solid rgba(255,255,255,.15);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background .2s;
  }

  .cart-btn:hover { background: rgba(255,255,255,.18); }

  .cart-count {
    background: var(--orange);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-btn {
    color: rgba(255,255,255,.6);
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 20px;
    transition: all .2s;
  }

  .login-btn:hover { color: #fff; background: rgba(255,255,255,.08); }

  /* ── HERO ── */
  .hero {
    background: linear-gradient(135deg, var(--dark) 0%, #2D2B55 100%);
    padding: 56px 24px 64px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -50%; left: -20%;
    width: 140%; height: 200%;
    background: radial-gradient(ellipse at 30% 50%, rgba(250,104,49,.12) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 5vw, 46px);
    color: #fff;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    position: relative;
  }

  .hero h1 span { color: var(--orange); }

  .hero p {
    color: rgba(255,255,255,.6);
    font-size: 16px;
    max-width: 520px;
    margin: 0 auto 28px;
    position: relative;
  }

  .hero-btn {
    background: var(--orange);
    color: #fff;
    padding: 13px 32px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 15px;
    text-decoration: none;
    display: inline-block;
    transition: background .2s;
    position: relative;
  }

  .hero-btn:hover { background: var(--orange-dark); }

  /* ── CATEGORIES ── */
  .categories {
    display: flex;
    gap: 10px;
    padding: 24px;
    overflow-x: auto;
    max-width: 1200px;
    margin: 0 auto;
    scrollbar-width: none;
  }

  .categories::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: var(--card);
    border: 2px solid var(--border);
    color: var(--text-muted);
    padding: 8px 20px;
    border-radius: 20px;
    font-family: 'Barlow', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
  }

  .cat-btn:hover, .cat-btn.active {
    border-color: var(--orange);
    color: var(--orange);
    background: var(--orange-light);
  }

  /* ── MAIN ── */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px 60px;
  }

  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 20px;
    color: var(--text);
  }

  /* ── PRODUCT GRID ── */
  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .product-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    overflow: hidden;
    transition: transform .2s, box-shadow .2s;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 8px 24px rgba(0,0,0,.12);
  }

  .product-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
  }

  .product-img img { width: 100%; height: 100%; object-fit: cover; }

  .product-info { padding: 16px; }

  .product-name {
    font-weight: 700;
    font-size: 15px;
    margin-bottom: 6px;
    line-height: 1.3;
  }

  .product-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .product-material {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    background: #EFF6FF;
    color: #3B82F6;
    text-transform: uppercase;
    letter-spacing: .5px;
  }

  .product-time {
    font-size: 12px;
    color: var(--text-muted);
  }

  .product-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 22px;
    color: var(--orange);
  }

  .product-price span {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
    margin-left: 2px;
  }

  .add-to-cart {
    background: var(--orange);
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 20px;
    font-family: 'Barlow', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: background .2s;
  }

  .add-to-cart:hover { background: var(--orange-dark); }

  .stock-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
  }

  .in-stock { background: #D1FAE5; color: #065F46; }
  .made-to-order { background: var(--orange-light); color: var(--orange-dark); }

  /* ── EMPTY / LOADING ── */
  .loading, .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--orange);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ── */
  footer {
    background: var(--dark);
    color: rgba(255,255,255,.4);
    text-align: center;
    padding: 24px;
    font-size: 13px;
  }

  footer a { color: var(--orange); text-decoration: none; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--dark);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-weight: 600;
    font-size: 14px;
    box-shadow: 0 8px 24px rgba(0,0,0,.3);
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 10px;
    transform: translateY(80px);
    opacity: 0;
    transition: all .3s;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <span class="logo-text">FILARA</span>
    <span class="header-sep">|</span>
    <span class="logo-sub">3D Tisk</span>
  </a>
  <div class="header-right">
    <a href="account.html" class="login-btn" id="loginBtn">Přihlásit se</a>
    <a href="cart.html" class="cart-btn">
      🛒 Košík
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </div>
</header>

<section class="hero">
  <h1>Handmade <span>3D výtisky</span><br>přímo pro vás</h1>
  <p>Zvířátka, vázy, dekorace a stojany. Tiskneme na objednávku z kvalitního PLA a PETG filamentu.</p>
  <a href="#produkty" class="hero-btn">Prohlédnout produkty ↓</a>
</section>

<div class="categories" id="categories">
  <button class="cat-btn active" onclick="filterCategory(null, this)">Vše</button>
</div>

<main id="produkty">
  <div class="section-title" id="sectionTitle">Všechny produkty</div>
  <div class="product-grid" id="productGrid">
    <div class="loading">
      <div class="spinner"></div>
      Načítám produkty...
    </div>
  </div>
</main>

<footer>
  © 2026 Filara 3D Tisk &nbsp;·&nbsp;
  <a href="mailto:info@filara.cz">info@filara.cz</a>
</footer>

<div class="toast" id="toast">
  <span class="dot"></span>
  <span id="toastMsg">Přidáno do košíku</span>
</div>

<script>
  const SUPABASE_URL = 'https://vpyvovmsmnqdacryiwpi.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_EPXUI-8zsNx31JjBLKyNFw_rBkGRfSm';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let allProducts = [];
  let cart = JSON.parse(localStorage.getItem('filara_cart') || '[]');

  // ── KOŠÍK ──────────────────────────────────────────────
  function updateCartCount() {
    const total = cart.reduce((a, i) => a + i.qty, 0);
    document.getElementById('cartCount').textContent = total;
  }

  function addToCart(e, product) {
    e.preventDefault();
    e.stopPropagation();
    const existing = cart.find(i => i.id === product.id);
    if (existing) existing.qty++;
    else cart.push({ id: product.id, name: product.name, price: product.price, image: product.images?.[0] || null, qty: 1 });
    localStorage.setItem('filara_cart', JSON.stringify(cart));
    updateCartCount();
    showToast(`${product.name} přidán do košíku`);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── KATEGORIE ──────────────────────────────────────────
  async function loadCategories() {
    const { data } = await sb.from('categories').select('*').order('sort_order');
    if (!data) return;
    const container = document.getElementById('categories');
    data.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'cat-btn';
      btn.textContent = cat.name;
      btn.onclick = () => filterCategory(cat.id, btn);
      container.appendChild(btn);
    });
  }

  function filterCategory(catId, btn) {
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = catId ? allProducts.filter(p => p.category_id === catId) : allProducts;
    document.getElementById('sectionTitle').textContent = catId
      ? btn.textContent
      : 'Všechny produkty';
    renderProducts(filtered);
  }

  // ── PRODUKTY ───────────────────────────────────────────
  async function loadProducts() {
    const { data, error } = await sb
      .from('products')
      .select('*, categories(name)')
      .eq('active', true)
      .order('created_at', { ascending: false });

    const grid = document.getElementById('productGrid');

    if (error || !data) {
      grid.innerHTML = '<div class="empty">Nepodařilo se načíst produkty.</div>';
      return;
    }

    allProducts = data;
    renderProducts(data);
  }

  function renderProducts(products) {
    const grid = document.getElementById('productGrid');

    if (!products.length) {
      grid.innerHTML = '<div class="empty">Žádné produkty v této kategorii.</div>';
      return;
    }

    grid.innerHTML = products.map(p => {
      const img = p.images?.[0]
        ? `<img src="${p.images[0]}" alt="${p.name}">`
        : `<div style="font-size:56px;padding:32px">${categoryEmoji(p.categories?.name)}</div>`;

      const stockBadge = p.in_stock
        ? `<span class="stock-badge in-stock">Skladem</span>`
        : `<span class="stock-badge made-to-order">Na objednávku</span>`;

      return `
        <a class="product-card" href="product.html?id=${p.id}">
          <div class="product-img">${img}</div>
          <div class="product-info">
            <div class="product-name">${p.name}</div>
            <div class="product-meta">
              <span class="product-material">${p.material || 'PLA'}</span>
              ${p.print_time_hours ? `<span class="product-time">~${p.print_time_hours}h tisk</span>` : ''}
            </div>
            <div class="product-bottom">
              <div>
                <div class="product-price">${Number(p.price).toFixed(0)} <span>Kč</span></div>
                ${stockBadge}
              </div>
              <button class="add-to-cart" onclick="addToCart(event, ${JSON.stringify(p).replace(/"/g, '&quot;')})">
                + Košík
              </button>
            </div>
          </div>
        </a>`;
    }).join('');
  }

  function categoryEmoji(name) {
    const map = { 'Zvířátka': '🦊', 'Vázy': '🏺', 'Dekorace': '✨', 'Stojany': '🕯️', 'Ostatní': '🖨️' };
    return map[name] || '🖨️';
  }

  // ── AUTH STATE ─────────────────────────────────────────
  sb.auth.onAuthStateChange((event, session) => {
    const btn = document.getElementById('loginBtn');
    if (session?.user) {
      btn.textContent = 'Můj účet';
      btn.href = 'account.html';
    } else {
      btn.textContent = 'Přihlásit se';
      btn.href = 'account.html';
    }
  });

  // ── INIT ───────────────────────────────────────────────
  updateCartCount();
  loadCategories();
  loadProducts();
</script>
</body>
</html>
